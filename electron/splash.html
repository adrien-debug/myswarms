<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>MySwarms</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(20px);
      color: #e8e8e8;
      font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; padding: 32px;
    }
    h1 {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.01em; margin-bottom: 8px;
    }
    p {
      font-size: 13px; color: #8a8a8a; margin-bottom: 32px;
    }
    .options {
      display: flex; gap: 12px; -webkit-app-region: no-drag;
    }
    button {
      flex: 1; min-width: 160px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    button:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 229, 204, 0.4);
      transform: translateY(-1px);
    }
    button .label { display: block; font-weight: 600; margin-bottom: 4px; }
    button .url { display: block; font-size: 11px; color: #8a8a8a; font-family: ui-monospace, monospace; }
    button.prod:hover { border-color: rgba(0, 229, 204, 0.6); }
    .footer {
      margin-top: 32px;
      font-size: 11px; color: #555;
      -webkit-app-region: no-drag;
    }
    .status {
      margin-top: 28px;
      min-height: 18px;
      font-size: 12px;
      color: #00e5cc;
      font-family: ui-monospace, monospace;
      letter-spacing: -0.01em;
      text-align: center;
    }
    .status.error { color: #ff6b6b; }
    .status.ready { color: #00e5cc; }
    .status::before {
      content: "● ";
      opacity: 0.7;
    }
    .status.hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MySwarms</h1>
    <p>Sélectionne l'environnement à lancer</p>
    <div class="options">
      <button class="local" onclick="window.electron.selectEnv('local')">
        <span class="label">Local</span>
        <span class="url">localhost:3000</span>
      </button>
      <button class="prod" onclick="window.electron.selectEnv('prod')">
        <span class="label">Production</span>
        <span class="url">myswarms.vercel.app</span>
      </button>
    </div>
    <div class="status hidden" id="status"></div>
    <div class="footer">Cmd+Q pour quitter · Menu → Changer d'environnement pour revenir ici</div>
  </div>
  <script>
    window.electron.getLastEnv().then(env => {
      const btn = document.querySelector('.' + env);
      if (btn) btn.style.borderColor = 'rgba(0, 229, 204, 0.4)';
    });

    const statusEl = document.getElementById('status');
    const optionsEl = document.querySelector('.options');
    if (window.electron.onBootStatus) {
      window.electron.onBootStatus(({ message, state }) => {
        statusEl.textContent = message;
        statusEl.className = 'status ' + (state || 'info');
        // Pendant le boot local, on masque les boutons de sélection.
        if (optionsEl) optionsEl.style.display = (state === 'error') ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
