# HEDGE Prometheus scrape config.
# Drop into /etc/prometheus/prometheus.yml or include via prometheus.d/.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/hedge_rules.yml

scrape_configs:
  - job_name: hedge-swarm-orchestrator
    static_configs:
      - targets: ["swarm-orchestrator:8000"]
  - job_name: hedge-risk-engine
    static_configs:
      - targets: ["risk-engine:8001"]
  - job_name: hedge-execution-engine
    static_configs:
      - targets: ["execution-engine:8002"]
  - job_name: hedge-strategy-builder
    static_configs:
      - targets: ["strategy-builder:8003"]
  - job_name: hedge-market-data
    static_configs:
      - targets: ["market-data-service:8004"]
